<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单自动填写助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            min-height: 200px;
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .container {
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .control-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            color: #333;
        }
        
        .form-group textarea {
            height: 60px;
            resize: vertical;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .status-section {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            display: none;
        }
        
        .status-section.visible {
            display: block;
        }
        
        .status-text {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-icon.success {
            background: #4ade80;
        }
        
        .status-icon.error {
            background: #f87171;
        }
        
        .status-icon.loading {
            background: #fbbf24;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .history-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .history-section.expanded {
            max-height: 200px;
        }
        
        .history-item {
            font-size: 12px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .toggle-history {
            text-align: center;
            font-size: 11px;
            opacity: 0.7;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .toggle-history:hover {
            opacity: 1;
        }
        
        .copyright {
            text-align: center;
            font-size: 10px;
            opacity: 0.5;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 隐藏的图标容器 */
        .icons {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 表单自动填写助手</h1>
            <p>快速填写问卷，支持自定义配置</p>
        </div>
        
        <div class="control-section">
            
            <div class="form-group">
                <label for="configXpath">XPath配置（每行一个）：</label>
                <textarea id="configXpath" placeholder=""></textarea>
            </div>
            
            <div class="form-group">
                <label for="fillValue">对应填充值（与XPath行对应）：</label>
                <textarea id="fillValue" placeholder="">
</textarea>
            </div>
            
            <div class="form-group">
                <label for="delayTime">操作延迟（毫秒）：</label>
                <input type="number" id="delayTime" value="1000" min="0" max="10000" step="100">
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" id="startFill">🚀 开始填写</button>
                <button class="btn btn-secondary" id="saveConfig">💾 保存配置</button>
            </div>
            
            <div class="toggle-history" id="toggleHistory">
                ▼ 查看填写历史
            </div>
            
            <div class="history-section" id="historySection">
                <!-- 历史记录将通过JS动态添加 -->
            </div>
        </div>
        
        <div class="status-section" id="statusSection">
            <div class="status-text">
                <span class="status-icon" id="statusIcon"></span>
                <span id="statusText">准备就绪</span>
            </div>
        </div>
        
        <div class="copyright">
            © 2026 表单自动填写助手 v1.0
        </div>
    </div>
    
    <!-- 图标容器 -->
    <div class="icons">
        <img src="icons/icon16.png" alt="16x16">
        <img src="icons/icon48.png" alt="48x48">
        <img src="icons/icon128.png" alt="128x128">
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
